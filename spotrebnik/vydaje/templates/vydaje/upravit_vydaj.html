{% extends 'base.html' %}
{% block title %}Upravit výdaj{% endblock %}
{% block content %}
    <h1 class="mb-4">Upravit výdaj</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary">Uložit</button>
          <a href="{% url 'seznam_vydaju' %}" class="btn btn-outline-secondary">Zpět</a>
        </div>
    </form>
{% endblock %}
