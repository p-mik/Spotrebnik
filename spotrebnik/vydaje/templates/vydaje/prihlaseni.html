<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení</title>
</head>
<body>
    {% if user.is_authenticated %}
        <p>Přihlášený uživatel: {{ user.username }}</p>
    {% else %}
        <p>Nikdo není přihlášen.</p>
    {% endif %}

    <h1>Přihlášení</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Přihlásit</button>
    </form>

    <br>
    <a href="{% url 'home' %}">Zpět na hlavní stránku</a>
</body>
</html>
