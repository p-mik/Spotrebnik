<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přidat výdaj</title>
</head>
<body>

    <br>
    <a href="{% url 'seznam_vydaju' %}">Zpět na seznam výdajů</a>
</body>
</html>
