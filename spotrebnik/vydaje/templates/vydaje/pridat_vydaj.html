<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přidat výdaj</title>
</head>
<body>
    {% if user.is_authenticated %}
        <p>Přihlášený uživatel: {{ user.username }}</p>
    {% else %}
        <p>Nikdo není přihlášen.</p>
    {% endif %}

    <h1>Přidat nový výdaj</h1>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Uložit</button>
    </form>

    <br>
    <a href="{% url 'seznam_vydaju' %}">Zpět na seznam výdajů</a>
</body>
</html>
